<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ .Title }} — {{ .Site.Title }}</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header>
  <h1><a href="/">{{ .Site.Title }}</a></h1>
</header>
<main>
  <article>
    <h1>{{ .Title }}</h1>
    <div class="meta">
      <time>{{ dateFormat "2006-01-02" .Date }}</time>
      {{ if .Params.tags }} — {{ range .Params.tags }}<span class="tag">{{ . }}</span>{{ end }}{{ end }}
    </div>
    {{ if .Params.cover }}
    <figure>
      <img src="{{ .Params.cover }}" alt="{{ .Title }}">
    </figure>
    {{ end }}
    <div class="content">{{ .Content }}</div>
  </article>
</main>
<footer>© {{ now.Year }} {{ .Site.Params.author }}</footer>
</body>
</html>
